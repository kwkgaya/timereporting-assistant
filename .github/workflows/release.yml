name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Resolve version
        id: ver
        shell: pwsh
        run: echo "version=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT

      - name: Build binaries
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags "-s -w -X main.version=$v" -o dist\timeporting.exe .\cmd\timeporting
          go build -trimpath -ldflags "-s -w -X main.version=$v" -o dist\mockjira.exe .\cmd\mockjira
          Copy-Item config.example.json dist\
          Copy-Item README.md dist\

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$v" "/DDistDir=$($PWD.Path)\dist" build\installer\timereporting.iss
          Get-ChildItem dist\*.exe | ForEach-Object { Write-Host $_.Name }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Timereporting Assistant ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/TimereportingAssistant-Setup-*.exe
